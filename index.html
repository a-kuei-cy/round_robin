<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>循環賽管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f1a;--surface:#111827;--s2:#1a2235;--s3:#212d42;
  --border:#1e2d45;--accent:#f59e0b;--red:#ef4444;--green:#10b981;--blue:#3b82f6;
  --text:#e2e8f0;--t2:#94a3b8;--t3:#64748b;
  --gold:#fbbf24;--silver:#94a3b8;--bronze:#d97706;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh}

/* ── HEADER ── */
.hdr{
  background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 100%);
  border-bottom:2px solid var(--accent);
  padding:14px 24px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;gap:10px;flex-wrap:wrap;
}
.logo{font-family:'Oswald',sans-serif;font-size:1.5rem;letter-spacing:2px;
  color:var(--accent);text-shadow:0 0 24px rgba(245,158,11,.4);white-space:nowrap}
.hdr-mid{display:flex;align-items:center;gap:10px;flex:1;max-width:360px}
.ev-sel{background:var(--s2);border:1px solid var(--border);color:var(--text);
  padding:7px 11px;border-radius:8px;font-family:'Noto Sans TC',sans-serif;font-size:.83rem;
  flex:1;cursor:pointer;outline:none}
.ev-sel:focus{border-color:var(--accent)}
.hdr-right{display:flex;align-items:center;gap:8px}
.spill{font-size:.72rem;color:var(--t2);display:flex;align-items:center;gap:5px}
.sd{width:7px;height:7px;border-radius:50%;background:var(--t3);flex-shrink:0}
.sd.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.sd.busy{background:var(--accent);animation:pulse 1.2s infinite}
.sd.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── TABS ── */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;padding:0 24px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tb{padding:12px 18px;background:none;border:none;color:var(--t2);cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;font-size:.85rem;font-weight:500;
  border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s}
.tb.on{color:var(--accent);border-bottom-color:var(--accent)}
.tb:hover:not(.on){color:var(--text)}

/* ── LAYOUT ── */
.main{max-width:1100px;margin:0 auto;padding:24px 18px}
.panel{display:none}.panel.on{display:block}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.g2{grid-template-columns:1fr}}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:20px;margin-bottom:16px}
.ch{font-family:'Oswald',sans-serif;font-size:1rem;letter-spacing:1px;
  color:var(--accent);margin-bottom:14px;display:flex;align-items:center;
  justify-content:space-between;gap:8px}
.ch-l{display:flex;align-items:center;gap:8px}
.ch-l::before{content:'';display:block;width:4px;height:15px;
  background:var(--accent);border-radius:2px}

/* ── FORM ── */
label{font-size:.78rem;color:var(--t2);display:block;margin-bottom:4px}
input[type=text],input[type=password],input[type=number],select,textarea{
  background:var(--s2);border:1px solid var(--border);color:var(--text);
  padding:8px 12px;border-radius:8px;font-family:'Noto Sans TC',sans-serif;
  font-size:.86rem;transition:border-color .2s;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
.row{display:flex;gap:8px;margin-bottom:10px;align-items:flex-end}
.f1{flex:1}.f2{flex:2}

/* ── BUTTONS ── */
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;font-weight:700;font-size:.85rem;
  transition:all .18s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.bp{background:var(--accent);color:#000}.bp:hover{background:#d97706;transform:translateY(-1px)}
.bs{background:var(--s2);border:1px solid var(--border);color:var(--text)}
.bs:hover{border-color:var(--accent);color:var(--accent)}
.bd{background:var(--red);color:#fff}.bd:hover{background:#dc2626}
.bg{background:var(--green);color:#fff}.bg:hover{background:#059669}
.bb{background:var(--blue);color:#fff}.bb:hover{background:#2563eb}
.bsm{padding:5px 11px;font-size:.78rem}
.bxs{padding:3px 8px;font-size:.72rem}
.bgrp{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}

/* ── INFO ── */
.info{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.18);
  border-radius:8px;padding:10px 14px;font-size:.82rem;color:var(--t2);margin-bottom:12px}
.al{padding:8px 13px;border-radius:8px;font-size:.82rem;margin-top:8px}
.al.ok{background:rgba(16,185,129,.1);color:#6ee7b7;border:1px solid rgba(16,185,129,.2)}
.al.err{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
.al.inf{background:rgba(59,130,246,.1);color:#93c5fd;border:1px solid rgba(59,130,246,.2)}

/* ── TEAM INPUT ── */
.tr{display:flex;gap:8px;align-items:center;margin-bottom:7px}
.tbadge{background:var(--accent);color:#000;font-family:'Oswald',sans-serif;font-weight:700;
  font-size:.72rem;padding:2px 7px;border-radius:4px;min-width:24px;text-align:center;flex-shrink:0}
.tdel{background:none;border:1px solid #374151;color:#6b7280;width:30px;height:30px;
  border-radius:6px;cursor:pointer;font-size:.95rem;transition:all .18s;flex-shrink:0}
.tdel:hover{border-color:var(--red);color:var(--red)}

/* ── DRAW ── */
#drawStage{display:none;text-align:center;padding:36px 16px}
.dtitle{font-family:'Oswald',sans-serif;font-size:1.9rem;letter-spacing:3px;
  color:var(--accent);text-shadow:0 0 28px rgba(245,158,11,.45)}
.balls{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin:24px 0;min-height:66px}
.ball{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Oswald',sans-serif;font-size:1.35rem;font-weight:700;color:#000;
  animation:ballIn .38s ease-out both;box-shadow:0 4px 16px rgba(0,0,0,.4)}
@keyframes ballIn{from{transform:scale(0) rotate(-180deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}

/* ── SCHEDULE ── */
.mc{background:var(--s2);border:1px solid var(--border);border-radius:9px;
  padding:12px 15px;margin-bottom:7px;transition:border-color .18s}
.mc:hover{border-color:rgba(245,158,11,.22)}
.mc.done{border-left:3px solid var(--green)}
.mno{font-size:.7rem;color:var(--t3);margin-bottom:5px}
.mbody{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.mteam{font-weight:700;font-size:.9rem}.mteam.r{text-align:right}
.mvs{font-family:'Oswald',sans-serif;color:var(--accent);font-weight:700;text-align:center;font-size:1.05rem}
.mscore{display:flex;align-items:center;gap:5px;justify-content:center;margin-top:7px}
.sci{width:54px!important;text-align:center;padding:5px 4px!important}
.rh{font-family:'Oswald',sans-serif;font-size:.85rem;color:var(--t3);
  padding:9px 0 3px;border-top:1px solid var(--border);margin-top:5px;letter-spacing:.5px}

/* ── STANDINGS ── */
.stt{width:100%;border-collapse:collapse;font-size:.86rem}
.stt th{text-align:center;padding:8px 9px;background:var(--s2);color:var(--t2);
  font-weight:700;font-size:.73rem;border-bottom:1px solid var(--border)}
.stt td{text-align:center;padding:9px 9px;border-bottom:1px solid rgba(30,45,69,.5)}
.stt tr:hover td{background:rgba(245,158,11,.03)}
.rc{font-family:'Oswald',sans-serif;font-size:1rem;font-weight:700}
.r1{color:var(--gold)}.r2{color:var(--silver)}.r3{color:var(--bronze)}
.tc{text-align:left!important;padding-left:12px!important;font-weight:700}
.pts{color:var(--accent);font-weight:700;font-family:'Oswald',sans-serif}
.sdot2{display:inline-flex;align-items:center;justify-content:center;
  width:20px;height:20px;border-radius:50%;font-family:'Oswald',sans-serif;
  font-size:.74rem;font-weight:700;color:#000;margin-right:5px;vertical-align:middle}

/* ── HISTORY ── */
.ht{width:100%;border-collapse:collapse;font-size:.8rem}
.ht th{text-align:left;padding:7px 9px;background:var(--s2);color:var(--t2);
  font-size:.73rem;border-bottom:1px solid var(--border)}
.ht td{padding:7px 9px;border-bottom:1px solid rgba(30,45,69,.35);vertical-align:top}
.ht tr:hover td{background:rgba(245,158,11,.02)}
.la{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.7rem;font-weight:700}
.la-score{background:rgba(16,185,129,.15);color:#6ee7b7}
.la-draw{background:rgba(245,158,11,.15);color:var(--accent)}
.la-create{background:rgba(59,130,246,.15);color:#93c5fd}
.la-reset{background:rgba(239,68,68,.15);color:#fca5a5}
.la-auth{background:rgba(148,163,184,.12);color:var(--t2)}
.la-delete{background:rgba(239,68,68,.2);color:#fca5a5}

/* ── EVENTS ── */
.evi{background:var(--s2);border:1px solid var(--border);border-radius:9px;
  padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;
  justify-content:space-between;gap:10px;cursor:pointer;transition:all .18s}
.evi:hover{border-color:rgba(245,158,11,.4);background:var(--s3)}
.evi.active{border-color:var(--accent);background:rgba(245,158,11,.05)}
.evn{font-weight:700;font-size:.92rem}
.evm{font-size:.73rem;color:var(--t2);margin-top:3px}
.evb{font-family:'Oswald',sans-serif;font-size:.78rem;padding:3px 9px;border-radius:5px;
  background:rgba(245,158,11,.12);color:var(--accent);white-space:nowrap}

/* ── STAT GRID ── */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:9px;margin-bottom:14px}
.sb{background:var(--s2);border-radius:9px;padding:13px;text-align:center}
.sbn{font-family:'Oswald',sans-serif;font-size:1.7rem;color:var(--accent)}
.sbl{font-size:.72rem;color:var(--t2);margin-top:2px}

/* ── MODAL ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);
  z-index:200;align-items:center;justify-content:center}
.ov.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:13px;
  padding:26px;width:92%;max-width:420px;animation:mIn .2s ease-out}
@keyframes mIn{from{transform:scale(.93) translateY(10px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.mh{font-family:'Oswald',sans-serif;font-size:1.2rem;color:var(--accent);
  margin-bottom:16px;letter-spacing:1px}
.mrow{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.mf{margin-bottom:10px}

/* ── MISC ── */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(245,158,11,.3);
  border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:32px;color:var(--t3);font-size:.88rem}
.div{height:1px;background:var(--border);margin:14px 0}

/* ── ADMIN BTN ── */
#adminBtn{background:transparent;border:1px solid var(--border);color:var(--t2);
  padding:6px 12px;border-radius:7px;cursor:pointer;font-size:.76rem;
  font-family:'Noto Sans TC',sans-serif;font-weight:700;transition:all .2s}
#adminBtn:hover{border-color:var(--accent);color:var(--accent)}
#adminBtn.on{background:var(--accent);color:#000;border-color:var(--accent)}

@media(max-width:600px){
  .hdr{padding:12px 14px}
  .logo{font-size:1.2rem}
  .tabs{padding:0 8px}
  .tb{padding:11px 12px;font-size:.8rem}
  .main{padding:16px 12px}
  .mbody{grid-template-columns:1fr}
  .mteam.r{text-align:left}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="logo">🏆 循環賽系統</div>
  <div class="hdr-mid">
    <select class="ev-sel" id="evSel" onchange="switchEv(this.value)">
      <option value="">── 選擇賽事 ──</option>
    </select>
  </div>
  <div class="hdr-right">
    <div class="spill"><span class="sd" id="sd"></span><span id="st">連接中...</span></div>
    <button id="adminBtn" onclick="toggleAdmin()">🔐 管理者</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tb on"  data-tab="events"    onclick="showTab(this,'events')">📁 賽事</button>
  <button class="tb"     data-tab="setup"     onclick="showTab(this,'setup')">⚙️ 設定</button>
  <button class="tb"     data-tab="draw"      onclick="showTab(this,'draw')">🎲 抽籤</button>
  <button class="tb"     data-tab="schedule"  onclick="showTab(this,'schedule')">📅 賽程</button>
  <button class="tb"     data-tab="standings" onclick="showTab(this,'standings')">🏆 積分榜</button>
  <button class="tb"     data-tab="history"   onclick="showTab(this,'history')">📜 歷史</button>
  <button class="tb"     data-tab="export"    onclick="showTab(this,'export')">📤 匯出</button>
</div>

<div class="main">

<!-- ══ EVENTS ══ -->
<div id="tab-events" class="panel on">
  <div class="card">
    <div class="ch"><div class="ch-l">賽事列表</div>
      <div style="display:flex;gap:7px">
        <button class="btn bs bsm" onclick="loadAll()">🔄 重整</button>
        <button class="btn bp bsm" onclick="openNewEv()">＋ 新增賽事</button>
      </div>
    </div>
    <div id="evList"><div class="empty">載入中...</div></div>
  </div>
</div>

<!-- ══ SETUP ══ -->
<div id="tab-setup" class="panel">
  <div class="card">
    <div class="ch"><div class="ch-l">賽事資訊</div></div>
    <div class="row">
      <div class="f2"><label>賽事名稱</label><input type="text" id="cfgName" placeholder="例：113學年度班際球賽"></div>
      <div class="f1"><label>積分（勝/平/負）</label>
        <div style="display:flex;gap:5px">
          <input type="number" id="cfgW" value="3" style="width:50px">
          <input type="number" id="cfgD" value="1" style="width:50px">
          <input type="number" id="cfgL" value="0" style="width:50px">
        </div>
      </div>
    </div>
    <label>備註</label>
    <textarea id="cfgNote" style="height:58px;resize:vertical;margin-bottom:4px"></textarea>
    <div class="bgrp"><button class="btn bp" onclick="saveSetup()">💾 儲存設定</button></div>
    <div id="setupMsg"></div>
  </div>
  <div class="card">
    <div class="ch"><div class="ch-l">參賽隊伍</div></div>
    <div class="info">隊伍依序編號，抽籤後隨機分配出場順位。</div>
    <div id="teamList"></div>
    <div class="bgrp">
      <button class="btn bs" onclick="addTeam()">＋ 新增隊伍</button>
      <button class="btn bp" onclick="saveTeams()">💾 儲存隊伍</button>
    </div>
    <div id="teamsMsg"></div>
  </div>
</div>

<!-- ══ DRAW ══ -->
<div id="tab-draw" class="panel">
  <div class="card" id="preDraw">
    <div class="ch"><div class="ch-l">抽籤前確認</div></div>
    <div id="drawPrev" class="sg"></div>
    <div class="info">⚠️ 執行抽籤將重新產生完整賽程，已記錄的比賽結果將清除。</div>
    <div class="bgrp"><button class="btn bp" onclick="startDraw()">🎲 開始抽籤</button></div>
  </div>
  <div id="drawStage">
    <div class="dtitle">🎲 隨機抽籤</div>
    <div style="font-size:.86rem;color:var(--t2);margin-top:5px" id="drawSub"></div>
    <div class="balls" id="ballsEl"></div>
    <div id="drawRes"></div>
  </div>
</div>

<!-- ══ SCHEDULE ══ -->
<div id="tab-schedule" class="panel">
  <div class="card">
    <div class="ch">
      <div class="ch-l">比賽賽程</div>
      <span style="font-size:.78rem;color:var(--t2)" id="schedSt"></span>
    </div>
    <div id="schedEl"><div class="empty">尚未抽籤。</div></div>
  </div>
</div>

<!-- ══ STANDINGS ══ -->
<div id="tab-standings" class="panel">
  <div class="card">
    <div class="ch"><div class="ch-l">積分排行榜</div></div>
    <div id="standEl"><div class="empty">尚無資料。</div></div>
  </div>
</div>

<!-- ══ HISTORY ══ -->
<div id="tab-history" class="panel">
  <div class="card">
    <div class="ch">
      <div class="ch-l">操作歷史紀錄</div>
      <button class="btn bs bsm" onclick="loadHist()">🔄 重整</button>
    </div>
    <div id="histEl"><div class="empty">載入中...</div></div>
  </div>
</div>

<!-- ══ EXPORT ══ -->
<div id="tab-export" class="panel">
  <div class="card">
    <div class="ch"><div class="ch-l">匯出資料</div></div>
    <div class="g2" style="margin-bottom:12px">
      <button class="btn bs" onclick="xcsv('schedule')">📄 賽程表 CSV</button>
      <button class="btn bs" onclick="xcsv('standings')">📊 積分榜 CSV</button>
      <button class="btn bs" onclick="xcsv('history')">📜 歷史紀錄 CSV</button>
      <button class="btn bs" onclick="xcsv('all')">📦 完整資料 CSV</button>
    </div>
    <div class="div"></div>
    <div class="g2" style="margin-bottom:12px">
      <button class="btn bp" onclick="printSched()">🖨️ 列印賽程表</button>
      <button class="btn bp" onclick="printStand()">🖨️ 列印積分榜</button>
    </div>
    <div class="div"></div>
    <button class="btn bg" onclick="openSheet()" style="width:100%;justify-content:center">🔗 開啟 Google 試算表</button>
  </div>
  <div class="card" id="adminCard" style="display:none">
    <div class="ch"><div class="ch-l">管理者操作</div></div>
    <div style="display:grid;gap:9px">
      <button class="btn bd" onclick="doReset()">🔄 重置目前賽事（清除賽程與成績）</button>
      <button class="btn bd" onclick="doDelete()">❌ 刪除目前賽事</button>
      <button class="btn bs" onclick="openChgPw()">🔑 修改管理者密碼</button>
    </div>
  </div>
</div>

</div><!-- /main -->

<!-- ══ MODAL: GAS Config ══ -->
<div class="ov" id="cfgMod">
  <div class="modal" style="max-width:480px">
    <div class="mh">⚙️ 連接 Google Apps Script</div>
    <p style="font-size:.82rem;color:var(--t2);margin-bottom:14px">GAS 網址已預先填入，設定管理者密碼後即可連接。</p>
    <label class="mf">GAS Web App 網址</label>
    <input type="text" id="cfgUrl" style="margin-bottom:10px">
    <label>管理者密碼（首次設定）</label>
    <input type="password" id="cfgPw" placeholder="設定密碼" style="margin-bottom:4px"
      onkeydown="if(event.key==='Enter')initCfg()">
    <div id="cfgMsg"></div>
    <div class="mrow"><button class="btn bp" onclick="initCfg()">連接並初始化</button></div>
  </div>
</div>

<!-- ══ MODAL: Admin ══ -->
<div class="ov" id="adminMod">
  <div class="modal">
    <div class="mh">🔐 管理者驗證</div>
    <input type="password" id="adminPw" placeholder="請輸入密碼" style="margin-bottom:4px"
      onkeydown="if(event.key==='Enter')checkAdmin()">
    <div id="adminMsg"></div>
    <div class="mrow">
      <button class="btn bs" onclick="close_('adminMod')">取消</button>
      <button class="btn bp" onclick="checkAdmin()">驗證</button>
    </div>
  </div>
</div>

<!-- ══ MODAL: Change PW ══ -->
<div class="ov" id="chgPwMod">
  <div class="modal">
    <div class="mh">🔑 修改密碼</div>
    <input type="password" id="np1" placeholder="新密碼" style="margin-bottom:8px">
    <input type="password" id="np2" placeholder="再次輸入" style="margin-bottom:4px">
    <div id="cpMsg"></div>
    <div class="mrow">
      <button class="btn bs" onclick="close_('chgPwMod')">取消</button>
      <button class="btn bp" onclick="doChgPw()">確認修改</button>
    </div>
  </div>
</div>

<!-- ══ MODAL: New Event ══ -->
<div class="ov" id="newEvMod">
  <div class="modal">
    <div class="mh">＋ 新增賽事</div>
    <label>賽事名稱</label>
    <input type="text" id="newEvName" placeholder="例：113學年度班際足球賽" style="margin-bottom:4px"
      onkeydown="if(event.key==='Enter')submitNewEv()">
    <div id="newEvMsg"></div>
    <div class="mrow">
      <button class="btn bs" onclick="close_('newEvMod')">取消</button>
      <button class="btn bp" onclick="submitNewEv()">建立</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// ★ GAS 網址（已內嵌）
// ═══════════════════════════════════════════
const GAS_DEFAULT = 'https://script.google.com/macros/s/AKfycbwDFOgMxha5Pm6iKqWEyncc3hWBgTcm91UNtTkpA8fbCM-bVQmQ2Hl2sN2ed3tMiCh_nw/exec';

const BPAL = ['#f59e0b','#ef4444','#3b82f6','#10b981','#8b5cf6','#ec4899',
  '#06b6d4','#84cc16','#f97316','#a855f7','#14b8a6','#f43f5e',
  '#6366f1','#22c55e','#eab308','#64748b'];

let GAS_URL = localStorage.getItem('rr_gas') || '';
let ADMIN   = false;
let CUR_EID = localStorage.getItem('rr_eid') || '';
let EVENTS  = [];
let STATE   = { event:{name:'',ptWin:3,ptDraw:1,ptLose:0,note:''}, teams:[], matches:[], sheetUrl:'' };
let HIST_CACHE = [];  // 歷史紀錄快取（供匯出用）

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  // 預填 GAS 網址
  $('cfgUrl').value = GAS_URL || GAS_DEFAULT;

  if (GAS_URL) {
    close_('cfgMod');
    loadAll();
  } else {
    // 首次使用：顯示設定 modal
    document.getElementById('cfgMod').classList.add('show');
  }
});

// ═══════════════════════════════════════════
// GAS 通訊
// ═══════════════════════════════════════════
async function gas(action, payload = {}) {
  const r = await fetch(GAS_URL, { method:'POST', body: JSON.stringify({ action, ...payload }) });
  return r.json();
}
function setSt(type, txt) {
  document.getElementById('sd').className = 'sd ' + type;
  document.getElementById('st').textContent = txt;
}

// ═══════════════════════════════════════════
// INIT CONFIG
// ═══════════════════════════════════════════
async function initCfg() {
  const url = $('cfgUrl').value.trim();
  const pw  = $('cfgPw').value.trim();
  if (!url) return msg('cfgMsg','請輸入 GAS 網址','err');
  if (!pw)  return msg('cfgMsg','請設定管理者密碼','err');
  msg('cfgMsg','<span class="spin"></span> 連接中...','inf');
  GAS_URL = url;
  try {
    const d = await gas('init', { password: pw });
    if (d.ok) {
      localStorage.setItem('rr_gas', url);
      STATE.sheetUrl = d.sheetUrl || '';
      close_('cfgMod');
      setSt('ok','已連接');
      loadAll();
    } else msg('cfgMsg','失敗：' + d.msg,'err');
  } catch(e) { msg('cfgMsg','無法連接 GAS','err'); }
}

// ═══════════════════════════════════════════
// LOAD ALL
// ═══════════════════════════════════════════
async function loadAll() {
  setSt('busy','載入中...');
  try {
    const d = await gas('listEvents');
    if (!d.ok) { setSt('err','載入失敗'); return; }
    EVENTS = d.events || [];
    STATE.sheetUrl = d.sheetUrl || STATE.sheetUrl;
    renderEvList();
    fillSel();
    if (CUR_EID) await loadEv(CUR_EID, true);
    setSt('ok','已連接');
  } catch(e) { setSt('err','連接失敗'); }
}

async function loadEv(eid, silent = false) {
  if (!eid) return;
  if (!silent) setSt('busy','載入賽事...');
  try {
    const d = await gas('loadEvent', { eid });
    if (d.ok) {
      CUR_EID = eid;
      localStorage.setItem('rr_eid', eid);
      STATE = { ...STATE, ...d.data };
      applyUI();
      if (!silent) setSt('ok','已載入');
    }
  } catch(e) { setSt('err','載入失敗'); }
}

function applyUI() {
  $('cfgName').value = STATE.event.name  || '';
  $('cfgW').value    = STATE.event.ptWin  ?? 3;
  $('cfgD').value    = STATE.event.ptDraw ?? 1;
  $('cfgL').value    = STATE.event.ptLose ?? 0;
  $('cfgNote').value = STATE.event.note  || '';
  renderTeams(); renderSched(); renderStand();
}

// ═══════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════
function renderEvList() {
  const el = document.getElementById('evList');
  if (!EVENTS.length) { el.innerHTML = '<div class="empty">尚無賽事，請點「＋ 新增賽事」</div>'; return; }
  el.innerHTML = EVENTS.map(e => `
    <div class="evi ${e.eid===CUR_EID?'active':''}" onclick="selEv('${e.eid}')">
      <div>
        <div class="evn">${esc(e.name)}</div>
        <div class="evm">建立：${e.createdAt||'—'} · ${e.teamCount||0} 隊 · ${e.doneCount||0}/${e.matchCount||0} 場完賽</div>
      </div>
      <span class="evb">${e.eid===CUR_EID?'✓ 目前':'切換'}</span>
    </div>`).join('');
}

function fillSel() {
  const sel = document.getElementById('evSel');
  sel.innerHTML = '<option value="">── 選擇賽事 ──</option>' +
    EVENTS.map(e => `<option value="${e.eid}" ${e.eid===CUR_EID?'selected':''}>${esc(e.name)}</option>`).join('');
}

async function selEv(eid) { await loadEv(eid); renderEvList(); fillSel(); }
async function switchEv(eid) { if (eid) { await loadEv(eid); renderEvList(); } }

function openNewEv() {
  if (!ADMIN) return needAdmin();
  $('newEvName').value = '';
  msg('newEvMsg','','');
  open_('newEvMod');
}

async function submitNewEv() {
  const name = $('newEvName').value.trim();
  if (!name) return msg('newEvMsg','請輸入賽事名稱','err');
  msg('newEvMsg','<span class="spin"></span> 建立中...','inf');
  try {
    const d = await gas('createEvent', { name });
    if (d.ok) {
      close_('newEvMod');
      await loadAll();
      await loadEv(d.eid);
      showTab(document.querySelector('[data-tab="setup"]'), 'setup');
    } else msg('newEvMsg','失敗：'+d.msg,'err');
  } catch(e) { msg('newEvMsg','連接失敗','err'); }
}

// ═══════════════════════════════════════════
// SETUP
// ═══════════════════════════════════════════
function addTeam(name='') {
  STATE.teams.push({ id: uid(), name, seed:0 });
  renderTeams();
}

function removeTeam(id) {
  if (!ADMIN) return needAdmin();
  STATE.teams = STATE.teams.filter(t => t.id !== id);
  renderTeams();
}

function renderTeams() {
  const el = document.getElementById('teamList');
  if (!STATE.teams.length) {
    el.innerHTML = '<div style="color:var(--t3);font-size:.82rem;padding:4px 0">尚未新增隊伍</div>';
    return;
  }
  el.innerHTML = STATE.teams.map((t,i) => `
    <div class="tr">
      <span class="tbadge">${i+1}</span>
      <input type="text" value="${esc(t.name)}" placeholder="隊伍名稱"
        oninput="STATE.teams[${i}].name=this.value" ${ADMIN?'':'readonly'}>
      ${ADMIN ? `<button class="tdel" onclick="removeTeam('${t.id}')">✕</button>` : ''}
    </div>`).join('');
}

async function saveSetup() {
  if (!ADMIN) return needAdmin();
  if (!CUR_EID) return alert('請先選擇或新增賽事');
  STATE.event.name   = $('cfgName').value;
  STATE.event.ptWin  = +$('cfgW').value || 3;
  STATE.event.ptDraw = +$('cfgD').value || 1;
  STATE.event.ptLose = +$('cfgL').value || 0;
  STATE.event.note   = $('cfgNote').value;
  setSt('busy','儲存中...');
  const d = await gas('saveEvent', { eid:CUR_EID,
    state:{ event:STATE.event, teams:STATE.teams, matches:STATE.matches } });
  if (d.ok) { msg('setupMsg','✅ 已儲存','ok'); setSt('ok','已儲存'); await loadAll(); }
  else { msg('setupMsg','失敗：'+d.msg,'err'); setSt('err','儲存失敗'); }
}

async function saveTeams() {
  if (!ADMIN) return needAdmin();
  if (!CUR_EID) return alert('請先選擇或新增賽事');
  document.querySelectorAll('#teamList input[type=text]').forEach((inp,i) => {
    if (STATE.teams[i]) STATE.teams[i].name = inp.value.trim();
  });
  STATE.teams = STATE.teams.filter(t => t.name);
  setSt('busy','儲存中...');
  const d = await gas('saveEvent', { eid:CUR_EID,
    state:{ event:STATE.event, teams:STATE.teams, matches:STATE.matches } });
  if (d.ok) { msg('teamsMsg','✅ 已儲存','ok'); setSt('ok','已儲存'); renderTeams(); }
  else msg('teamsMsg','失敗：'+d.msg,'err');
}

// ═══════════════════════════════════════════
// DRAW
// ═══════════════════════════════════════════
function renderDrawPrev() {
  const teams = STATE.teams.filter(t => t.name);
  document.getElementById('drawPrev').innerHTML = teams.length
    ? teams.map((t,i) => `<div class="sb"><div class="sbn">${i+1}</div><div class="sbl">${esc(t.name)}</div></div>`).join('')
    : '<div style="color:var(--t3)">請先至「設定」新增隊伍</div>';
}

async function startDraw() {
  if (!ADMIN) return needAdmin();
  if (!CUR_EID) return alert('請先選擇賽事');
  const teams = STATE.teams.filter(t => t.name);
  if (teams.length < 2) return alert('請至少設定 2 支隊伍');

  document.getElementById('preDraw').style.display = 'none';
  document.getElementById('drawStage').style.display = 'block';
  const sub = document.getElementById('drawSub');
  const bEl = document.getElementById('ballsEl');
  bEl.innerHTML = '';
  sub.textContent = '洗牌中...';

  const seeds = shuffle([...Array(teams.length)].map((_,i) => i+1));
  for (let i = 0; i < teams.length; i++) {
    await delay(290);
    sub.textContent = `第 ${seeds[i]} 號 → ${teams[i].name}`;
    const b = document.createElement('div');
    b.className = 'ball';
    b.style.background = BPAL[i % BPAL.length];
    b.textContent = seeds[i];
    bEl.appendChild(b);
  }
  await delay(380);
  sub.textContent = '產生賽程中...';

  teams.forEach((t,i) => t.seed = seeds[i]);
  STATE.teams = [...teams].sort((a,b) => a.seed - b.seed);
  STATE.matches = genRR(STATE.teams);

  setSt('busy','儲存中...');
  const d = await gas('saveEvent', { eid:CUR_EID,
    state:{ event:STATE.event, teams:STATE.teams, matches:STATE.matches },
    logAction:'draw', logDetail:`${teams.length}隊抽籤，共${STATE.matches.length}場` });
  if (d.ok) setSt('ok','已儲存');

  document.getElementById('drawRes').innerHTML = `
    <div class="al ok" style="text-align:left;max-width:380px;margin:14px auto 0">
      ✅ 抽籤完成 · 共 ${STATE.matches.length} 場比賽<br>
      ${STATE.teams.map(t=>`<div style="margin-top:3px;font-size:.85rem">
        <span style="color:var(--accent);font-family:'Oswald',sans-serif">No.${t.seed}</span> ${esc(t.name)}</div>`).join('')}
    </div>
    <div class="bgrp" style="justify-content:center;margin-top:14px">
      <button class="btn bp" onclick="goSched()">📅 查看賽程</button>
      <button class="btn bs" onclick="resetDraw()">↩ 返回</button>
    </div>`;
  await loadAll();
}

function resetDraw() {
  document.getElementById('preDraw').style.display = 'block';
  document.getElementById('drawStage').style.display = 'none';
  document.getElementById('ballsEl').innerHTML = '';
  document.getElementById('drawRes').innerHTML = '';
}

function goSched() {
  resetDraw();
  showTab(document.querySelector('[data-tab="schedule"]'), 'schedule');
}

function genRR(teams) {
  const arr = [...teams];
  if (arr.length % 2 === 1) arr.push({ id:'bye', name:'輪空', seed:0 });
  const half = arr.length / 2, rounds = arr.length - 1;
  const ms = []; let mid = 1;
  for (let r = 0; r < rounds; r++) {
    for (let i = 0; i < half; i++) {
      const h = arr[i], a = arr[arr.length-1-i];
      if (h.id==='bye' || a.id==='bye') continue;
      ms.push({ id:mid++, r:r+1, home:h.id, away:a.id, hs:'', as:'', done:false });
    }
    arr.splice(1, 0, arr.pop());
  }
  return ms;
}

// ═══════════════════════════════════════════
// SCHEDULE
// ═══════════════════════════════════════════
function renderSched() {
  const el = document.getElementById('schedEl');
  if (!STATE.matches.length) { el.innerHTML = '<div class="empty">尚未抽籤。</div>'; return; }
  const tm = Object.fromEntries(STATE.teams.map(t => [t.id, t]));
  const byR = {};
  STATE.matches.forEach(m => { (byR[m.r] = byR[m.r] || []).push(m); });
  const done = STATE.matches.filter(m => m.done).length;
  document.getElementById('schedSt').textContent = `${done}/${STATE.matches.length} 場完賽`;
  let html = '';
  Object.entries(byR).forEach(([r, ms]) => {
    html += `<div class="rh">第 ${r} 輪</div>`;
    ms.forEach(m => {
      const h = tm[m.home], a = tm[m.away];
      if (!h || !a) return;
      html += `<div class="mc ${m.done?'done':''}" id="mc-${m.id}">
        <div class="mno">場次 #${m.id}</div>
        <div class="mbody">
          <div class="mteam r">${esc(h.name)}</div>
          <div class="mvs">VS</div>
          <div class="mteam">${esc(a.name)}</div>
        </div>
        ${ADMIN ? `<div class="mscore">
          <input type="number" class="sci" id="hs-${m.id}" value="${m.hs}" min="0" placeholder="0">
          <span style="color:var(--t2);font-weight:700">:</span>
          <input type="number" class="sci" id="as-${m.id}" value="${m.as}" min="0" placeholder="0">
          <button class="btn bg bsm" onclick="saveScore(${m.id})">儲存</button>
          ${m.done?'<span style="color:var(--green);font-size:.72rem">✓</span>':''}
        </div>`
        : `<div style="text-align:center;font-size:.86rem;margin-top:6px;color:${m.done?'var(--text)':'var(--t3)'}">
          ${m.done?`<span style="font-family:'Oswald',sans-serif;font-size:1.15rem">${m.hs}：${m.as}</span>`:'待賽'}
        </div>`}
      </div>`;
    });
  });
  el.innerHTML = html;
}

async function saveScore(mid) {
  const hs = document.getElementById('hs-'+mid)?.value;
  const as = document.getElementById('as-'+mid)?.value;
  if (hs==='' || as==='') return alert('請輸入兩方分數');
  const m = STATE.matches.find(x => x.id === mid);
  if (!m) return;
  const tm = Object.fromEntries(STATE.teams.map(t => [t.id,t]));
  const old = m.done ? `原${m.hs}:${m.as}` : '新增';
  m.hs = +hs; m.as = +as; m.done = true;
  const detail = `場次#${mid} ${tm[m.home]?.name||'?'} ${m.hs}:${m.as} ${tm[m.away]?.name||'?'} (${old})`;
  setSt('busy','儲存...');
  const d = await gas('saveEvent', { eid:CUR_EID,
    state:{ event:STATE.event, teams:STATE.teams, matches:STATE.matches },
    logAction:'score', logDetail:detail });
  if (d.ok) { setSt('ok','已儲存'); renderSched(); renderStand(); }
  else setSt('err','儲存失敗');
}

// ═══════════════════════════════════════════
// STANDINGS
// ═══════════════════════════════════════════
function calcStand() {
  const { ptWin, ptDraw, ptLose } = STATE.event;
  const map = {};
  STATE.teams.forEach(t => { map[t.id] = { id:t.id, name:t.name, seed:t.seed, W:0,D:0,L:0,GF:0,GA:0,P:0,played:0 }; });
  STATE.matches.filter(m => m.done).forEach(m => {
    const h = map[m.home], a = map[m.away];
    if (!h || !a) return;
    const hs = +m.hs, as = +m.as;
    h.GF+=hs; h.GA+=as; a.GF+=as; a.GA+=hs; h.played++; a.played++;
    if (hs > as)      { h.W++; h.P+=+ptWin;  a.L++; a.P+=+ptLose; }
    else if (hs < as) { a.W++; a.P+=+ptWin;  h.L++; h.P+=+ptLose; }
    else              { h.D++; h.P+=+ptDraw; a.D++; a.P+=+ptDraw; }
  });
  return Object.values(map).sort((a,b) => b.P-a.P || (b.GF-b.GA)-(a.GF-a.GA) || b.GF-a.GF);
}

function renderStand() {
  const el = document.getElementById('standEl');
  if (!STATE.teams.length) { el.innerHTML = '<div class="empty">尚無資料</div>'; return; }
  const rows = calcStand();
  const ri = ['🥇','🥈','🥉'], rc = ['r1','r2','r3'];
  let html = `<table class="stt"><thead><tr>
    <th>名次</th><th style="text-align:left;padding-left:12px">隊伍</th>
    <th>賽</th><th>勝</th><th>平</th><th>負</th><th>進/失</th><th>差</th><th>積分</th>
  </tr></thead><tbody>`;
  rows.forEach((r,i) => {
    const diff = r.GF - r.GA;
    html += `<tr>
      <td class="rc ${rc[i]||''}">${i<3?ri[i]:i+1}</td>
      <td class="tc">
        <span class="sdot2" style="background:${BPAL[(r.seed-1)%BPAL.length]}">${r.seed||'?'}</span>${esc(r.name)}
      </td>
      <td>${r.played}</td>
      <td style="color:#4ade80">${r.W}</td>
      <td style="color:var(--t2)">${r.D}</td>
      <td style="color:#f87171">${r.L}</td>
      <td>${r.GF}/${r.GA}</td>
      <td style="color:${diff>=0?'#4ade80':'#f87171'}">${diff>0?'+':''}${diff}</td>
      <td class="pts">${r.P}</td>
    </tr>`;
  });
  el.innerHTML = html + '</tbody></table>';
}

// ═══════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════
async function loadHist() {
  document.getElementById('histEl').innerHTML = '<div class="empty"><span class="spin"></span> 載入中...</div>';
  try {
    const d = await gas('getHistory', { eid: CUR_EID });
    HIST_CACHE = d.logs || [];
    if (!d.ok || !HIST_CACHE.length) {
      document.getElementById('histEl').innerHTML = '<div class="empty">尚無紀錄</div>';
      return;
    }
    const typeMap = { score:'la-score', draw:'la-draw', create:'la-create',
      reset:'la-reset', auth:'la-auth', changePassword:'la-auth',
      deleteEvent:'la-delete' };
    const labelMap = { score:'成績記錄', draw:'抽籤', create:'建立賽事',
      reset:'重置', auth:'管理者登入', changePassword:'修改密碼', deleteEvent:'刪除賽事' };
    let html = `<table class="ht"><thead><tr>
      <th>時間</th><th>動作</th><th>賽事</th><th>說明</th>
    </tr></thead><tbody>`;
    [...HIST_CACHE].reverse().forEach(l => {
      const cls = typeMap[l.action] || 'la-auth';
      const lbl = labelMap[l.action] || l.action;
      html += `<tr>
        <td style="color:var(--t3);white-space:nowrap;font-size:.75rem">${l.ts||''}</td>
        <td><span class="la ${cls}">${lbl}</span></td>
        <td style="color:var(--t2);font-size:.8rem">${esc(l.eventName||'—')}</td>
        <td style="font-size:.8rem">${esc(l.detail||'')}</td>
      </tr>`;
    });
    document.getElementById('histEl').innerHTML = html + '</tbody></table>';
  } catch(e) {
    document.getElementById('histEl').innerHTML = '<div class="empty">連接失敗</div>';
  }
}

// ═══════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════
function xcsv(type) {
  const BOM = '\uFEFF';
  const tm  = Object.fromEntries(STATE.teams.map(t => [t.id, t]));
  let rows  = [];

  if (type === 'schedule') {
    rows = [['場次','輪別','主隊','客隊','主隊分','客隊分','狀態']];
    STATE.matches.forEach(m => rows.push([
      m.id, m.r, tm[m.home]?.name||'', tm[m.away]?.name||'', m.hs, m.as, m.done?'完賽':'待賽'
    ]));
  } else if (type === 'standings') {
    rows = [['名次','抽籤號','隊伍','賽','勝','平','負','進球','失球','積分']];
    calcStand().forEach((r,i) => rows.push([i+1,r.seed,r.name,r.played,r.W,r.D,r.L,r.GF,r.GA,r.P]));
  } else if (type === 'history') {
    if (!HIST_CACHE.length) return alert('請先切換到「歷史」頁面載入後再匯出');
    rows = [['時間','動作','賽事','說明']];
    [...HIST_CACHE].reverse().forEach(l => rows.push([l.ts, l.action, l.eventName, l.detail]));
  } else if (type === 'all') {
    rows = [['=== 賽事資訊 ===']];
    rows.push(['賽事名稱', STATE.event.name]);
    rows.push(['積分制（勝/平/負）', `${STATE.event.ptWin}/${STATE.event.ptDraw}/${STATE.event.ptLose}`]);
    rows.push(['備註', STATE.event.note||'']);
    rows.push([]);
    rows.push(['=== 賽程 ==='],['場次','輪別','主隊','客隊','主隊分','客隊分','狀態']);
    STATE.matches.forEach(m => rows.push([
      m.id, m.r, tm[m.home]?.name||'', tm[m.away]?.name||'', m.hs, m.as, m.done?'完賽':'待賽'
    ]));
    rows.push([]);
    rows.push(['=== 積分榜 ==='],['名次','抽籤號','隊伍','賽','勝','平','負','進球','失球','積分']);
    calcStand().forEach((r,i) => rows.push([i+1,r.seed,r.name,r.played,r.W,r.D,r.L,r.GF,r.GA,r.P]));
    if (HIST_CACHE.length) {
      rows.push([]);
      rows.push(['=== 歷史紀錄 ==='],['時間','動作','賽事','說明']);
      [...HIST_CACHE].reverse().forEach(l => rows.push([l.ts,l.action,l.eventName,l.detail]));
    }
  }

  const csv = BOM + rows.map(r =>
    r.map(c => `"${String(c??'').replace(/"/g,'""')}"`).join(',')
  ).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type:'text/csv;charset=utf-8' }));
  a.download = `${STATE.event.name||'循環賽'}_${type}_${dateStr()}.csv`;
  a.click();
}

function printSched() {
  const tm = Object.fromEntries(STATE.teams.map(t => [t.id,t]));
  const byR = {};
  STATE.matches.forEach(m => { (byR[m.r]=byR[m.r]||[]).push(m); });
  let body = `<h2>${esc(STATE.event.name)||'循環賽賽程表'}</h2>`;
  Object.entries(byR).forEach(([r,ms]) => {
    body += `<h3>第 ${r} 輪</h3>
      <table border="1" cellpadding="6" style="border-collapse:collapse;width:100%;font-size:13px">
      <tr style="background:#eee"><th>場次</th><th>主隊</th><th>比分</th><th>客隊</th></tr>`;
    ms.forEach(m => {
      body += `<tr><td>#${m.id}</td><td>${tm[m.home]?.name||''}</td>
        <td style="text-align:center">${m.done?m.hs+':'+m.as:'___:___'}</td>
        <td>${tm[m.away]?.name||''}</td></tr>`;
    });
    body += '</table><br>';
  });
  popPrint(body);
}

function printStand() {
  const rows = calcStand();
  let body = `<h2>${esc(STATE.event.name)||'循環賽積分榜'}</h2>
    <table border="1" cellpadding="6" style="border-collapse:collapse;width:100%;font-size:13px">
    <tr style="background:#eee"><th>名次</th><th>抽籤號</th><th>隊伍</th>
    <th>賽</th><th>勝</th><th>平</th><th>負</th><th>進</th><th>失</th><th>差</th><th>積分</th></tr>`;
  rows.forEach((r,i) => {
    const d = r.GF-r.GA;
    body += `<tr><td>${i+1}</td><td>${r.seed}</td><td><b>${esc(r.name)}</b></td>
      <td>${r.played}</td><td>${r.W}</td><td>${r.D}</td><td>${r.L}</td>
      <td>${r.GF}</td><td>${r.GA}</td><td>${d>0?'+':''}${d}</td><td><b>${r.P}</b></td></tr>`;
  });
  popPrint(body + '</table>');
}

function popPrint(body) {
  const w = window.open('','','width=960,height=720');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
    <style>body{font-family:sans-serif;padding:24px}h2{margin-bottom:14px}h3{margin:14px 0 6px}</style></head>
    <body>${body}<script>window.print();<\/script></body></html>`);
  w.document.close();
}

function openSheet() {
  if (STATE.sheetUrl) window.open(STATE.sheetUrl,'_blank');
  else alert('尚未取得試算表連結');
}

// ═══════════════════════════════════════════
// ADMIN
// ═══════════════════════════════════════════
function toggleAdmin() {
  if (ADMIN) {
    ADMIN = false;
    const btn = document.getElementById('adminBtn');
    btn.textContent = '🔐 管理者';
    btn.classList.remove('on');
    document.getElementById('adminCard').style.display = 'none';
    renderTeams(); renderSched();
  } else {
    $('adminPw').value = '';
    msg('adminMsg','','');
    open_('adminMod');
  }
}

async function checkAdmin() {
  const pw = $('adminPw').value;
  msg('adminMsg','<span class="spin"></span> 驗證中...','inf');
  try {
    const d = await gas('auth', { password: pw });
    if (d.ok) {
      ADMIN = true;
      close_('adminMod');
      const btn = document.getElementById('adminBtn');
      btn.textContent = '🔓 管理者';
      btn.classList.add('on');
      document.getElementById('adminCard').style.display = 'block';
      renderTeams(); renderSched();
      await gas('log', { eid:CUR_EID, action:'auth', detail:'管理者登入' });
    } else msg('adminMsg','密碼錯誤','err');
  } catch { msg('adminMsg','驗證失敗','err'); }
}

function needAdmin() { alert('請先點右上角「🔐 管理者」登入'); }

function openChgPw() {
  $('np1').value=''; $('np2').value='';
  msg('cpMsg','','');
  open_('chgPwMod');
}

async function doChgPw() {
  const p1=$('np1').value, p2=$('np2').value;
  if (!p1) return msg('cpMsg','密碼不可為空','err');
  if (p1!==p2) return msg('cpMsg','兩次不一致','err');
  msg('cpMsg','<span class="spin"></span>','inf');
  const d = await gas('changePassword', { password:p1 });
  if (d.ok) { msg('cpMsg','✅ 已更新','ok'); setTimeout(()=>close_('chgPwMod'),1200); }
  else msg('cpMsg','失敗：'+d.msg,'err');
}

async function doReset() {
  if (!ADMIN) return needAdmin();
  if (!CUR_EID) return alert('請先選擇賽事');
  if (!confirm(`確定重置「${STATE.event.name}」的賽程與成績？隊伍資料保留，此動作無法復原。`)) return;
  STATE.matches = [];
  STATE.teams.forEach(t => t.seed = 0);
  const d = await gas('saveEvent', { eid:CUR_EID,
    state:{ event:STATE.event, teams:STATE.teams, matches:[] },
    logAction:'reset', logDetail:`重置：${STATE.event.name}` });
  if (d.ok) { alert('已重置。'); applyUI(); await loadAll(); }
}

async function doDelete() {
  if (!ADMIN) return needAdmin();
  if (!CUR_EID) return alert('請先選擇賽事');
  if (!confirm(`確定永久刪除「${STATE.event.name}」？此動作無法復原！`)) return;
  const d = await gas('deleteEvent', { eid:CUR_EID });
  if (d.ok) {
    CUR_EID = ''; localStorage.removeItem('rr_eid');
    STATE = { event:{name:'',ptWin:3,ptDraw:1,ptLose:0,note:''}, teams:[], matches:[], sheetUrl:STATE.sheetUrl };
    applyUI(); await loadAll();
    showTab(document.querySelector('[data-tab="events"]'), 'events');
  } else alert('刪除失敗：'+d.msg);
}

// ═══════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════
function showTab(btn, tab) {
  document.querySelectorAll('.tb').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('tab-'+tab).classList.add('on');
  if (tab==='draw')      renderDrawPrev();
  if (tab==='schedule')  renderSched();
  if (tab==='standings') renderStand();
  if (tab==='history')   loadHist();
  if (tab==='events')    renderEvList();
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function $(id)      { return document.getElementById(id); }
function v(id)      { return $(id)?.value||''; }
function open_(id)  { $(id).classList.add('show'); }
function close_(id) { $(id).classList.remove('show'); }
function msg(id, html, type) {
  const el = $(id); if(!el) return;
  el.innerHTML = html ? `<div class="al ${type}">${html}</div>` : '';
}
function esc(s) {
  return String(s||'').replace(/[&<>"']/g, m =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function uid()      { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function delay(ms)  { return new Promise(r=>setTimeout(r,ms)); }
function shuffle(a) {
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function dateStr()  { return new Date().toISOString().slice(0,10); }
