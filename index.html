<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分組循環賽系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c14;--sf:#0f1724;--s2:#162030;--s3:#1c2a3e;--s4:#223248;
  --bd:#1e3050;--ac:#f59e0b;--red:#ef4444;--grn:#10b981;--blu:#3b82f6;
  --tx:#dde6f0;--t2:#7a9ab8;--t3:#4a6480;
  --gold:#fbbf24;--silver:#94a3b8;--bronze:#d97706;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans TC',sans-serif;min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(245,158,11,.04),transparent 60%),
    radial-gradient(ellipse at 80% 100%,rgba(59,130,246,.04),transparent 60%)}

/* HEADER */
.hdr{background:rgba(8,12,20,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--bd);
  padding:12px 22px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;gap:10px;flex-wrap:wrap}
.logo{font-family:'Oswald',sans-serif;font-size:1.4rem;letter-spacing:3px;color:var(--ac);
  text-shadow:0 0 20px rgba(245,158,11,.35);white-space:nowrap}
.hdr-mid{display:flex;align-items:center;gap:8px;flex:1;max-width:320px}
.ev-sel{background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px 10px;
  border-radius:8px;font-family:'Noto Sans TC',sans-serif;font-size:.81rem;flex:1;
  cursor:pointer;outline:none;transition:border-color .2s}
.ev-sel:focus{border-color:var(--ac)}
.hdr-r{display:flex;align-items:center;gap:8px}
.spill{font-size:.71rem;color:var(--t2);display:flex;align-items:center;gap:5px}
.sd{width:7px;height:7px;border-radius:50%;background:var(--t3);flex-shrink:0}
.sd.ok{background:var(--grn);box-shadow:0 0 6px var(--grn)}
.sd.busy{background:var(--ac);animation:pulse 1.2s infinite}
.sd.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#adminBtn{background:transparent;border:1px solid var(--bd);color:var(--t2);
  padding:5px 11px;border-radius:7px;cursor:pointer;font-size:.74rem;
  font-family:'Noto Sans TC',sans-serif;font-weight:700;transition:all .2s}
#adminBtn:hover{border-color:var(--ac);color:var(--ac)}
#adminBtn.on{background:var(--ac);color:#000;border-color:var(--ac)}

/* TABS */
.tabs{background:rgba(15,23,36,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--bd);
  display:flex;padding:0 18px;overflow-x:auto;scrollbar-width:none;
  position:sticky;top:51px;z-index:90}
.tabs::-webkit-scrollbar{display:none}
.tb{padding:11px 15px;background:none;border:none;color:var(--t2);cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;font-size:.82rem;font-weight:500;
  border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tb.on{color:var(--ac);border-bottom-color:var(--ac)}
.tb:hover:not(.on){color:var(--tx)}

/* LAYOUT */
.main{max-width:1160px;margin:0 auto;padding:20px 16px}
.panel{display:none}.panel.on{display:block}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
@media(max-width:700px){.g2,.g3{grid-template-columns:1fr}}

/* CARD */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:19px;margin-bottom:15px}
.ch{font-family:'Oswald',sans-serif;font-size:.98rem;letter-spacing:1px;color:var(--ac);
  margin-bottom:13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.ch-l{display:flex;align-items:center;gap:7px}
.ch-l::before{content:'';display:block;width:3px;height:14px;background:var(--ac);border-radius:2px}

/* GROUP COLORS */
.GC=['#f59e0b','#3b82f6','#10b981','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16'];

/* FORM */
label{font-size:.76rem;color:var(--t2);display:block;margin-bottom:4px}
input[type=text],input[type=password],input[type=number],select,textarea{
  background:var(--s2);border:1px solid var(--bd);color:var(--tx);
  padding:8px 11px;border-radius:8px;font-family:'Noto Sans TC',sans-serif;font-size:.85rem;
  transition:border-color .2s;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--ac)}
.row{display:flex;gap:8px;margin-bottom:10px;align-items:flex-end}
.f1{flex:1}.f2{flex:2}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;font-weight:700;font-size:.83rem;
  transition:all .18s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.bp{background:var(--ac);color:#000}.bp:hover{background:#d97706;transform:translateY(-1px)}
.bs{background:var(--s2);border:1px solid var(--bd);color:var(--tx)}
.bs:hover{border-color:var(--ac);color:var(--ac)}
.bd_{background:var(--red);color:#fff}.bd_:hover{background:#dc2626}
.bg_{background:var(--grn);color:#fff}.bg_:hover{background:#059669}
.bsm{padding:5px 10px;font-size:.76rem}
.bgrp{display:flex;gap:8px;flex-wrap:wrap;margin-top:11px}

/* INFO / ALERT */
.info{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);
  border-radius:8px;padding:10px 13px;font-size:.8rem;color:var(--t2);margin-bottom:12px}
.al{padding:8px 12px;border-radius:8px;font-size:.8rem;margin-top:8px}
.al.ok{background:rgba(16,185,129,.09);color:#6ee7b7;border:1px solid rgba(16,185,129,.2)}
.al.err{background:rgba(239,68,68,.09);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
.al.inf{background:rgba(59,130,246,.09);color:#93c5fd;border:1px solid rgba(59,130,246,.2)}

/* TEAM ROW */
.trow{display:flex;gap:7px;align-items:center;margin-bottom:7px}
.tbadge{background:var(--ac);color:#000;font-family:'Oswald',sans-serif;font-weight:700;
  font-size:.7rem;padding:2px 6px;border-radius:4px;min-width:24px;text-align:center;flex-shrink:0}
.tdel{background:none;border:1px solid #374151;color:#4a6480;width:29px;height:29px;
  border-radius:6px;cursor:pointer;font-size:.9rem;transition:all .18s;flex-shrink:0}
.tdel:hover{border-color:var(--red);color:var(--red)}

/* GROUP CARD */
.grp-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);
  padding:17px;margin-bottom:13px}

/* DRAW */
#drawStage{display:none;text-align:center;padding:28px 14px}
.dtitle{font-family:'Oswald',sans-serif;font-size:1.75rem;letter-spacing:3px;
  color:var(--ac);text-shadow:0 0 22px rgba(245,158,11,.4)}
.balls{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin:18px 0;min-height:60px}
.ball{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Oswald',sans-serif;font-size:1.25rem;font-weight:700;color:#000;
  animation:ballIn .33s ease-out both;box-shadow:0 4px 14px rgba(0,0,0,.4)}
@keyframes ballIn{from{transform:scale(0) rotate(-180deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.draw-grps{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:18px}
.draw-grp-box{border-radius:10px;padding:13px;min-width:130px;text-align:center;border-width:2px;border-style:solid}
.draw-grp-name{font-family:'Oswald',sans-serif;letter-spacing:1px;font-size:.92rem;margin-bottom:8px}
.draw-grp-team{font-size:.82rem;padding:3px 0;border-bottom-width:1px;border-bottom-style:solid;border-bottom-color:var(--bd)}
.draw-grp-team:last-child{border-bottom:none}

/* MATCH CARD */
.mc{background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:11px 14px;margin-bottom:7px;transition:border-color .18s}
.mc:hover{border-color:rgba(245,158,11,.2)}
.mc.done{border-left:3px solid var(--grn)}
.mno{font-size:.68rem;color:var(--t3);margin-bottom:4px}
.mbody{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.mt{font-weight:700;font-size:.88rem}.mt.r{text-align:right}
.mvs{font-family:'Oswald',sans-serif;color:var(--ac);font-weight:700;text-align:center}
.mscore{display:flex;align-items:center;gap:5px;justify-content:center;margin-top:7px}
.sci{width:52px!important;text-align:center;padding:4px!important}
.rh{font-family:'Oswald',sans-serif;font-size:.82rem;color:var(--t3);
  padding:8px 0 3px;border-top:1px solid var(--bd);margin-top:4px}

/* STANDINGS */
.stt{width:100%;border-collapse:collapse;font-size:.84rem}
.stt th{text-align:center;padding:8px 8px;background:var(--s2);color:var(--t2);font-weight:700;font-size:.71rem;border-bottom:1px solid var(--bd)}
.stt td{text-align:center;padding:9px 8px;border-bottom:1px solid rgba(30,48,80,.5)}
.stt tr:hover td{background:rgba(245,158,11,.02)}
.rc{font-family:'Oswald',sans-serif;font-size:1rem;font-weight:700}
.r1{color:var(--gold)}.r2{color:var(--silver)}.r3{color:var(--bronze)}
.tc{text-align:left!important;padding-left:10px!important;font-weight:700}
.pts{color:var(--ac);font-weight:700;font-family:'Oswald',sans-serif}
.sdot2{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;
  border-radius:50%;font-family:'Oswald',sans-serif;font-size:.7rem;font-weight:700;
  color:#000;margin-right:4px;vertical-align:middle}
.adv-tag{display:inline-block;font-size:.63rem;padding:1px 4px;border-radius:3px;
  background:rgba(16,185,129,.15);color:#6ee7b7;border:1px solid rgba(16,185,129,.2);
  margin-left:4px;vertical-align:middle}

/* MATRIX */
.matrix-wrap{overflow-x:auto}
.matrix{border-collapse:collapse;font-size:.79rem;width:100%}
.matrix th,.matrix td{border:1px solid var(--bd);padding:6px 8px;text-align:center;white-space:nowrap}
.matrix th{background:var(--s2);color:var(--t2);font-weight:700;font-size:.72rem}
.matrix td.diag{background:var(--s3);color:var(--t3)}
.matrix td.won{color:#4ade80;font-weight:700}
.matrix td.lost{color:#f87171}
.matrix td.drw{color:var(--t2)}
.matrix .team-th{text-align:left;font-weight:700;color:var(--tx);padding-left:9px;max-width:110px;
  overflow:hidden;text-overflow:ellipsis}

/* CHARTS */
.chart-wrap{position:relative;background:var(--s2);border-radius:9px;padding:16px;margin-bottom:14px}
.chart-title{font-family:'Oswald',sans-serif;font-size:.85rem;color:var(--t2);letter-spacing:.5px;margin-bottom:12px}
canvas{display:block;width:100%!important}

/* KNOCKOUT */
.ko-section{margin-bottom:24px}
.ko-round-title{font-family:'Oswald',sans-serif;font-size:.95rem;letter-spacing:2px;
  color:var(--t2);margin-bottom:11px;padding-bottom:7px;border-bottom:1px solid var(--bd)}
.ko-bracket{display:flex;flex-wrap:wrap;gap:10px}
.ko-match{background:var(--s2);border:1px solid var(--bd);border-radius:9px;
  padding:11px 15px;min-width:230px;position:relative}
.ko-match::before{content:attr(data-label);position:absolute;top:-8px;left:11px;
  background:var(--sf);padding:0 5px;font-size:.67rem;color:var(--t2);font-family:'Oswald',sans-serif}
.ko-team{display:flex;align-items:center;gap:7px;padding:5px 0}
.ko-team:first-of-type{border-bottom:1px solid var(--bd)}
.ko-seed{font-family:'Oswald',sans-serif;font-size:.78rem;font-weight:700;
  width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:#000;flex-shrink:0}
.ko-name{font-weight:700;font-size:.87rem;flex:1}
.ko-rank{font-size:.68rem;color:var(--t2);white-space:nowrap}
.ko-tbd{color:var(--t3);font-style:italic}

/* DRAG */
.drag-handle{cursor:grab;color:var(--t3);font-size:.85rem;padding:0 3px;transition:color .15s;flex-shrink:0}
.drag-handle:hover{color:var(--ac)}
.drag-handle:active{cursor:grabbing}
.dragging{opacity:.4;transform:scale(.97)}
.drag-over{outline:2px dashed var(--ac);background:rgba(245,158,11,.06)}

/* HISTORY */
.ht{width:100%;border-collapse:collapse;font-size:.78rem}
.ht th{text-align:left;padding:7px 9px;background:var(--s2);color:var(--t2);font-size:.71rem;border-bottom:1px solid var(--bd)}
.ht td{padding:7px 9px;border-bottom:1px solid rgba(30,48,80,.35);vertical-align:top}
.ht tr:hover td{background:rgba(245,158,11,.015)}
.la{display:inline-block;padding:2px 6px;border-radius:4px;font-size:.68rem;font-weight:700}
.la-score{background:rgba(16,185,129,.14);color:#6ee7b7}
.la-draw{background:rgba(245,158,11,.14);color:var(--ac)}
.la-create{background:rgba(59,130,246,.14);color:#93c5fd}
.la-reset{background:rgba(239,68,68,.14);color:#fca5a5}
.la-auth{background:rgba(148,163,184,.1);color:var(--t2)}

/* EVENTS LIST */
.evi{background:var(--s2);border:1px solid var(--bd);border-radius:9px;
  padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;
  justify-content:space-between;gap:10px;cursor:pointer;transition:all .18s}
.evi:hover{border-color:rgba(245,158,11,.35);background:var(--s3)}
.evi.active{border-color:var(--ac);background:rgba(245,158,11,.05)}
.evn{font-weight:700;font-size:.9rem}
.evm{font-size:.71rem;color:var(--t2);margin-top:3px}
.evb{font-family:'Oswald',sans-serif;font-size:.76rem;padding:3px 8px;border-radius:5px;
  background:rgba(245,158,11,.1);color:var(--ac);white-space:nowrap}

/* STAT GRID */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:13px}
.sb{background:var(--s2);border-radius:9px;padding:11px;text-align:center}
.sbn{font-family:'Oswald',sans-serif;font-size:1.6rem;color:var(--ac)}
.sbl{font-size:.7rem;color:var(--t2);margin-top:2px}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:200;align-items:center;justify-content:center;padding:14px}
.ov.show{display:flex}
.modal{background:var(--sf);border:1px solid var(--bd);border-radius:12px;
  padding:22px;width:100%;max-width:420px;animation:mIn .2s ease-out;max-height:90vh;overflow-y:auto}
@keyframes mIn{from{transform:scale(.93) translateY(8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.mh{font-family:'Oswald',sans-serif;font-size:1.12rem;color:var(--ac);margin-bottom:14px;letter-spacing:1px}
.mrow{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}

/* MISC */
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(245,158,11,.25);
  border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:30px;color:var(--t3);font-size:.85rem}
.divhr{height:1px;background:var(--bd);margin:13px 0}

@media(max-width:580px){
  .hdr{padding:10px 12px}.logo{font-size:1.1rem}
  .tabs{padding:0 5px}.tb{padding:10px 10px;font-size:.77rem}
  .main{padding:13px 10px}
  .mbody{grid-template-columns:1fr}.mt.r{text-align:left}
  .ko-match{min-width:175px}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">🏆 分組循環賽</div>
  <div class="hdr-mid">
    <select class="ev-sel" id="evSel" onchange="switchEv(this.value)">
      <option value="">── 選擇賽事 ──</option>
    </select>
  </div>
  <div class="hdr-r">
    <div class="spill"><span class="sd" id="sd"></span><span id="st">連接中...</span></div>
    <button id="adminBtn" onclick="toggleAdmin()">🔐 管理者</button>
  </div>
</div>

<div class="tabs">
  <button class="tb on" data-tab="events"    onclick="showTab(this,'events')">📁 賽事</button>
  <button class="tb"    data-tab="setup"     onclick="showTab(this,'setup')">⚙️ 設定</button>
  <button class="tb"    data-tab="grouping"  onclick="showTab(this,'grouping')">🎲 分組</button>
  <button class="tb"    data-tab="schedule"  onclick="showTab(this,'schedule')">📅 賽程</button>
  <button class="tb"    data-tab="standings" onclick="showTab(this,'standings')">📊 積分榜</button>
  <button class="tb"    data-tab="charts"    onclick="showTab(this,'charts')">📈 圖表</button>
  <button class="tb"    data-tab="knockout"  onclick="showTab(this,'knockout')">⚔️ 淘汰賽</button>
  <button class="tb"    data-tab="history"   onclick="showTab(this,'history')">📜 歷史</button>
  <button class="tb"    data-tab="export"    onclick="showTab(this,'export')">📤 匯出</button>
</div>

<div class="main">

<!-- EVENTS -->
<div id="tab-events" class="panel on">
  <div class="card">
    <div class="ch"><div class="ch-l">賽事列表</div>
      <div style="display:flex;gap:7px">
        <button class="btn bs bsm" onclick="loadAll()">🔄 重整</button>
        <button class="btn bp bsm" onclick="openNewEv()">＋ 新增賽事</button>
      </div>
    </div>
    <div id="evList"><div class="empty">載入中...</div></div>
  </div>
</div>

<!-- SETUP -->
<div id="tab-setup" class="panel">
  <div class="card">
    <div class="ch"><div class="ch-l">賽事資訊</div></div>
    <div class="row">
      <div class="f2"><label>賽事名稱</label><input type="text" id="cfgName" placeholder="例：113學年度班際籃球賽"></div>
      <div class="f1"><label>積分（勝/平/負）</label>
        <div style="display:flex;gap:4px">
          <input type="number" id="cfgW" value="3" style="width:46px">
          <input type="number" id="cfgD" value="1" style="width:46px">
          <input type="number" id="cfgL" value="0" style="width:46px">
        </div>
      </div>
    </div>
    <div class="row">
      <div class="f1"><label>組數</label><input type="number" id="cfgGroups" value="2" min="2" max="8" style="width:68px"></div>
      <div class="f1"><label>每組晉級名額</label><input type="number" id="cfgAdvance" value="2" min="1" max="8" style="width:68px"></div>
      <div class="f2"><label>備註</label><input type="text" id="cfgNote" placeholder="場地、規則..."></div>
    </div>
    <div class="bgrp"><button class="btn bp" onclick="saveSetup()">💾 儲存設定</button></div>
    <div id="setupMsg"></div>
  </div>
  <div class="card">
    <div class="ch"><div class="ch-l">參賽隊伍</div>
      <span style="font-size:.77rem;color:var(--t2)" id="teamCount">0 隊</span></div>
    <div class="info">新增所有隊伍後，至「分組」頁面執行抽籤。</div>
    <div id="teamList"></div>
    <div class="bgrp">
      <button class="btn bs" onclick="addTeam()">＋ 新增</button>
      <button class="btn bp" onclick="saveTeams()">💾 儲存隊伍</button>
    </div>
    <div id="teamsMsg"></div>
  </div>
</div>

<!-- GROUPING -->
<div id="tab-grouping" class="panel">
  <div class="card" id="preGrpCard">
    <div class="ch"><div class="ch-l">自動抽籤分組</div></div>
    <div id="grpCfgInfo" class="info"></div>
    <div id="drawPrev" class="sg"></div>
    <div class="info">⚠️ 執行抽籤將重新分組並清除已記錄成績。</div>
    <div class="bgrp"><button class="btn bp" onclick="startDraw()">🎲 開始自動抽籤</button></div>
  </div>
  <div class="card" id="manGrpCard" style="display:none">
    <div class="ch">
      <div class="ch-l">手動調整分組</div>
      <div style="display:flex;gap:7px">
        <button class="btn bs bsm" onclick="resetToAuto()">↩ 重新自動抽籤</button>
        <button class="btn bp bsm" onclick="confirmGroups()">✅ 確認產生賽程</button>
      </div>
    </div>
    <div class="info">拖曳隊伍名稱可在各組間移動。</div>
    <div id="manGrps" style="display:flex;gap:12px;flex-wrap:wrap"></div>
    <div id="groupMsg"></div>
  </div>
  <div id="drawStage">
    <div class="dtitle">🎲 分組抽籤</div>
    <div style="font-size:.84rem;color:var(--t2);margin-top:5px" id="drawSub"></div>
    <div class="balls" id="ballsEl"></div>
    <div class="draw-grps" id="drawGrps"></div>

<script>
// ══════════════════════════════════════
// CONFIG
// ══════════════════════════════════════
const GAS_URL_DEFAULT = 'https://script.google.com/macros/s/AKfycbwy-Ew6BYCIRPVgYmn3JsBxS-uYpvGQmKf-5NNKLOZ1_aXUh4w_sd6do0aviVbfCSYa/exec';
const BPAL  = ['#f59e0b','#3b82f6','#10b981','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16'];
const GC    = ['#f59e0b','#3b82f6','#10b981','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16'];
const GN    = ['A','B','C','D','E','F','G','H'];

let GAS_URL   = localStorage.getItem('rr_gas') || '';
let ADMIN     = false;
let CUR_EID   = localStorage.getItem('rr_eid') || '';
let EVENTS    = [];
let HIST_CACHE= [];
let CHARTS    = {};   // canvas chart instances

let S = {
  event:  {name:'',ptWin:3,ptDraw:1,ptLose:0,note:'',numGroups:2,advanceN:2},
  teams:  [],
  groups: [],   // [[teamId,...],...]
  matches:[],   // [{id,gIdx,r,home,away,hs,as,done}]
  sheetUrl:''
};

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
window.addEventListener('DOMContentLoaded',()=>{
  $('cfgUrl').value = GAS_URL || GAS_URL_DEFAULT;
  if(GAS_URL){ close_('cfgMod'); loadAll(); }
  else open_('cfgMod');
});

// ══════════════════════════════════════
// GAS
// ══════════════════════════════════════
async function gas(action,payload={}){
  const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action,...payload})});
  return r.json();
}
function setSt(t,m){$('sd').className='sd '+t;$('st').textContent=m;}

async function initCfg(){
  const url=$('cfgUrl').value.trim(),pw=$('cfgPw').value.trim();
  if(!url) return msg('cfgMsg','請輸入 GAS 網址','err');
  if(!pw)  return msg('cfgMsg','請設定管理者密碼','err');
  msg('cfgMsg','<span class="spin"></span> 連接中...','inf');
  GAS_URL=url;
  try{
    const d=await gas('init',{password:pw});
    if(d.ok){localStorage.setItem('rr_gas',url);S.sheetUrl=d.sheetUrl||'';close_('cfgMod');setSt('ok','已連接');loadAll();}
    else msg('cfgMsg','失敗：'+d.msg,'err');
  }catch(e){msg('cfgMsg','無法連接 GAS','err');}
}

// ══════════════════════════════════════
// LOAD
// ══════════════════════════════════════
async function loadAll(){
  setSt('busy','載入中...');
  try{
    const d=await gas('listEvents');
    if(!d.ok){setSt('err','載入失敗');return;}
    EVENTS=d.events||[];S.sheetUrl=d.sheetUrl||S.sheetUrl;
    renderEvList();fillSel();
    if(CUR_EID) await loadEv(CUR_EID,true);
    setSt('ok','已連接');
  }catch(e){setSt('err','連接失敗');}
}

async function loadEv(eid,silent=false){
  if(!eid) return;
  if(!silent) setSt('busy','載入...');
  try{
    const d=await gas('loadEvent',{eid});
    if(d.ok){CUR_EID=eid;localStorage.setItem('rr_eid',eid);S={...S,...d.data};applyUI();if(!silent)setSt('ok','已載入');}
  }catch(e){setSt('err','載入失敗');}
}

function applyUI(){
  $('cfgName').value    = S.event.name||'';
  $('cfgW').value       = S.event.ptWin??3;
  $('cfgD').value       = S.event.ptDraw??1;
  $('cfgL').value       = S.event.ptLose??0;
  $('cfgNote').value    = S.event.note||'';
  $('cfgGroups').value  = S.event.numGroups||2;
  $('cfgAdvance').value = S.event.advanceN||2;
  renderTeams();renderGroupTab();renderSched();renderStand();renderKO();
}

// ══════════════════════════════════════
// EVENTS
// ══════════════════════════════════════
function renderEvList(){
  const el=$('evList');
  if(!EVENTS.length){el.innerHTML='<div class="empty">尚無賽事</div>';return;}
  el.innerHTML=EVENTS.map(e=>`
    <div class="evi ${e.eid===CUR_EID?'active':''}" onclick="selEv('${e.eid}')">
      <div>
        <div class="evn">${esc(e.name)}</div>
        <div class="evm">建立：${e.createdAt||'—'} · ${e.teamCount||0}隊 · ${e.numGroups||'?'}組 · ${e.doneCount||0}/${e.matchCount||0}場完賽</div>
      </div>
      <span class="evb">${e.eid===CUR_EID?'✓ 目前':'切換'}</span>
    </div>`).join('');
}
function fillSel(){
  $('evSel').innerHTML='<option value="">── 選擇賽事 ──</option>'+
    EVENTS.map(e=>`<option value="${e.eid}" ${e.eid===CUR_EID?'selected':''}>${esc(e.name)}</option>`).join('');
}
async function selEv(eid){await loadEv(eid);renderEvList();fillSel();}
async function switchEv(eid){if(eid){await loadEv(eid);renderEvList();}}
function openNewEv(){if(!ADMIN) return needAdmin();$('newEvName').value='';msg('newEvMsg','','');open_('newEvMod');}
async function submitNewEv(){
  const name=$('newEvName').value.trim();
  if(!name) return msg('newEvMsg','請輸入賽事名稱','err');
  msg('newEvMsg','<span class="spin"></span>','inf');
  try{
    const d=await gas('createEvent',{name});
    if(d.ok){close_('newEvMod');await loadAll();await loadEv(d.eid);showTab($$('[data-tab="setup"]'),'setup');}
    else msg('newEvMsg','失敗：'+d.msg,'err');
  }catch(e){msg('newEvMsg','連接失敗','err');}
}

// ══════════════════════════════════════
// SETUP
// ══════════════════════════════════════
function addTeam(n=''){S.teams.push({id:uid(),name:n,seed:0});renderTeams();}
function removeTeam(id){if(!ADMIN)return needAdmin();S.teams=S.teams.filter(t=>t.id!==id);renderTeams();}
function renderTeams(){
  const el=$('teamList');
  $('teamCount').textContent=S.teams.length+' 隊';
  if(!S.teams.length){el.innerHTML='<div style="color:var(--t3);font-size:.8rem;padding:4px 0">尚未新增隊伍</div>';return;}
  el.innerHTML=S.teams.map((t,i)=>`
    <div class="trow">
      <span class="tbadge">${i+1}</span>
      <input type="text" value="${esc(t.name)}" placeholder="隊伍名稱"
        oninput="S.teams[${i}].name=this.value" ${ADMIN?'':'readonly'}>
      ${ADMIN?`<button class="tdel" onclick="removeTeam('${t.id}')">✕</button>`:''}
    </div>`).join('');
}
async function saveSetup(){
  if(!ADMIN) return needAdmin();
  if(!CUR_EID) return alert('請先選擇或新增賽事');
  S.event.name=      $('cfgName').value;
  S.event.ptWin=    +$('cfgW').value||3;
  S.event.ptDraw=   +$('cfgD').value||1;
  S.event.ptLose=   +$('cfgL').value||0;
  S.event.note=      $('cfgNote').value;
  S.event.numGroups=+$('cfgGroups').value||2;
  S.event.advanceN= +$('cfgAdvance').value||2;
  setSt('busy','儲存中...');
  const d=await gas('saveEvent',{eid:CUR_EID,state:snap()});
  if(d.ok){msg('setupMsg','✅ 已儲存','ok');setSt('ok','已儲存');await loadAll();}
  else{msg('setupMsg','失敗：'+d.msg,'err');setSt('err','儲存失敗');}
}
async function saveTeams(){
  if(!ADMIN) return needAdmin();
  if(!CUR_EID) return alert('請先選擇或新增賽事');
  document.querySelectorAll('#teamList input[type=text]').forEach((inp,i)=>{if(S.teams[i])S.teams[i].name=inp.value.trim();});
  S.teams=S.teams.filter(t=>t.name);
  setSt('busy','儲存中...');
  const d=await gas('saveEvent',{eid:CUR_EID,state:snap()});
  if(d.ok){msg('teamsMsg','✅ 已儲存','ok');setSt('ok','已儲存');renderTeams();}
  else msg('teamsMsg','失敗：'+d.msg,'err');
}

// ══════════════════════════════════════
// GROUPING
// ══════════════════════════════════════
function renderGroupTab(){
  const ng=S.event.numGroups||2,adv=S.event.advanceN||2;
  const teams=S.teams.filter(t=>t.name);
  $('grpCfgInfo').textContent=`目前設定：${ng} 組 · 每組 ${Math.ceil(teams.length/ng)} 隊 · 每組前 ${adv} 名晉級`;
  $('drawPrev').innerHTML=teams.length
    ? teams.map((t,i)=>`<div class="sb"><div class="sbn">${i+1}</div><div class="sbl">${esc(t.name)}</div></div>`).join('')
    : '<div style="color:var(--t3)">請先至「設定」新增隊伍</div>';
  if(S.groups.length){
    $('preGrpCard').style.display='none';
    $('manGrpCard').style.display='block';
    renderManGroups();
  } else {
    $('preGrpCard').style.display='block';
    $('manGrpCard').style.display='none';
  }
  $('drawStage').style.display='none';
}

function renderManGroups(){
  const tm=tmMap();const ng=S.event.numGroups||2;
  while(S.groups.length<ng) S.groups.push([]);
  const el=$('manGrps');el.innerHTML='';
  S.groups.forEach((grp,gi)=>{
    const col=GC[gi%GC.length];
    const wrap=document.createElement('div');
    wrap.style.cssText=`background:var(--s2);border:2px solid ${col};border-radius:10px;padding:13px;min-width:145px;flex:1`;
    wrap.innerHTML=`<div style="font-family:'Oswald',sans-serif;letter-spacing:1px;color:${col};font-size:.9rem;margin-bottom:9px">${GN[gi]} 組</div>
      <div id="slot-${gi}" data-gi="${gi}" style="min-height:36px"></div>`;
    el.appendChild(wrap);
    const slot=wrap.querySelector(`#slot-${gi}`);
    setupDrop(slot,gi);
    grp.forEach(tid=>{const t=tm[tid];if(t) slot.appendChild(makeDrag(t,gi));});
  });
}

function makeDrag(team,gi){
  const el=document.createElement('div');
  el.style.cssText='background:var(--s3);border-radius:7px;padding:5px 8px;margin-bottom:5px;user-select:none;display:flex;align-items:center;gap:5px';
  el.setAttribute('draggable','true');
  el.setAttribute('data-tid',team.id);
  el.innerHTML=`<span class="drag-handle">⠿</span><span style="font-size:.83rem;font-weight:700">${esc(team.name)}</span>`;
  el.addEventListener('dragstart',e=>{e.dataTransfer.setData('tid',team.id);e.dataTransfer.setData('fromGi',gi);el.classList.add('dragging');});
  el.addEventListener('dragend',()=>el.classList.remove('dragging'));
  return el;
}
function setupDrop(slot,gi){
  slot.addEventListener('dragover',e=>{e.preventDefault();slot.classList.add('drag-over');});
  slot.addEventListener('dragleave',()=>slot.classList.remove('drag-over'));
  slot.addEventListener('drop',e=>{
    e.preventDefault();slot.classList.remove('drag-over');
    const tid=e.dataTransfer.getData('tid'),fromGi=+e.dataTransfer.getData('fromGi');
    if(!tid) return;
    S.groups[fromGi]=S.groups[fromGi].filter(id=>id!==tid);
    if(!S.groups[gi].includes(tid)) S.groups[gi].push(tid);
    renderManGroups();
  });
}

// ══════════════════════════════════════
// DRAW (SNAKE)
// ══════════════════════════════════════
async function startDraw(){
  if(!ADMIN) return needAdmin();
  if(!CUR_EID) return alert('請先選擇賽事');
  const teams=S.teams.filter(t=>t.name);
  const ng=S.event.numGroups||2;
  if(teams.length<ng) return alert(`至少需要 ${ng} 隊`);
  $('preGrpCard').style.display='none';$('manGrpCard').style.display='none';
  $('drawStage').style.display='block';
  $('ballsEl').innerHTML='';$('drawGrps').innerHTML='';$('drawRes').innerHTML='';
  $('drawSub').textContent='洗牌中...';

  const shuffled=shuffle([...teams]);
  shuffled.forEach((t,i)=>t.seed=i+1);

  for(let i=0;i<shuffled.length;i++){
    await delay(200);
    $('drawSub').textContent=`第 ${i+1} 號：${shuffled[i].name}`;
    const b=document.createElement('div');
    b.className='ball';b.style.background=BPAL[i%BPAL.length];b.textContent=i+1;
    $('ballsEl').appendChild(b);
  }
  await delay(280);$('drawSub').textContent='蛇形分組中...';

  // snake seeding
  const grps=Array.from({length:ng},()=>[]);
  shuffled.forEach((t,i)=>{
    const row=Math.floor(i/ng),col=row%2===0?i%ng:ng-1-(i%ng);
    grps[col].push(t.id);
  });
  S.groups=grps;S.teams=shuffled;

  // show groups
  const tm=tmMap();
  $('drawGrps').innerHTML=grps.map((g,gi)=>{
    const col=GC[gi%GC.length];
    return `<div class="draw-grp-box" style="background:var(--s2);border-color:${col};--gc:${col}">
      <div class="draw-grp-name" style="color:${col}">${GN[gi]} 組</div>
      ${g.map(id=>`<div class="draw-grp-team">${esc(tm[id]?.name||'?')}</div>`).join('')}
    </div>`;
  }).join('');

  S.matches=genAllMatches(S.groups,S.teams);
  setSt('busy','儲存中...');
  const d=await gas('saveEvent',{eid:CUR_EID,state:snap(),logAction:'draw',logDetail:`${teams.length}隊分${ng}組，${S.matches.length}場`});
  if(d.ok) setSt('ok','已儲存');

  $('drawRes').innerHTML=`
    <div class="al ok" style="max-width:400px;margin:10px auto 0;text-align:left">
      ✅ 分組完成 · 共 ${S.matches.length} 場循環賽
    </div>
    <div class="bgrp" style="justify-content:center;margin-top:11px">
      <button class="btn bp" onclick="goToSched()">📅 查看賽程</button>
      <button class="btn bs" onclick="goManual()">✏️ 手動調整分組</button>
    </div>`;
  await loadAll();
}

function goManual(){
  $('drawStage').style.display='none';
  $('preGrpCard').style.display='none';
  $('manGrpCard').style.display='block';
  renderManGroups();
}
function resetToAuto(){S.groups=[];S.matches=[];$('manGrpCard').style.display='none';$('preGrpCard').style.display='block';}
async function confirmGroups(){
  if(!ADMIN) return needAdmin();
  const empty=S.groups.findIndex(g=>g.length===0);
  if(empty>=0) return msg('groupMsg',`${GN[empty]} 組沒有隊伍，請調整`,'err');
  S.matches=genAllMatches(S.groups,S.teams);
  setSt('busy','儲存中...');
  const d=await gas('saveEvent',{eid:CUR_EID,state:snap(),logAction:'draw',logDetail:`手動分組，${S.matches.length}場`});
  if(d.ok){msg('groupMsg','✅ 已儲存並產生賽程','ok');setSt('ok','已儲存');renderSched();renderStand();renderKO();}
  else msg('groupMsg','儲存失敗：'+d.msg,'err');
}
function goToSched(){
  $('drawStage').style.display='none';$('preGrpCard').style.display='none';
  $('manGrpCard').style.display='block';renderManGroups();
  showTab($$('[data-tab="schedule"]'),'schedule');
}

// ══════════════════════════════════════
// ROUND-ROBIN
// ══════════════════════════════════════
function genAllMatches(groups,teams){
  const tm=tmMap(teams);const all=[];let mid=1;
  groups.forEach((grp,gi)=>{
    const arr=grp.map(id=>tm[id]).filter(Boolean);
    if(arr.length<2) return;
    if(arr.length%2===1) arr.push({id:'bye',name:'輪空'});
    const half=arr.length/2,rounds=arr.length-1,pool=[...arr];
    for(let r=0;r<rounds;r++){
      for(let i=0;i<half;i++){
        const h=pool[i],a=pool[pool.length-1-i];
        if(h.id==='bye'||a.id==='bye') continue;
        all.push({id:mid++,gIdx:gi,r:r+1,home:h.id,away:a.id,hs:'',as:'',done:false});
      }
      pool.splice(1,0,pool.pop());
    }
  });
  return all;
}

// ══════════════════════════════════════
// SCHEDULE
// ══════════════════════════════════════
function renderSched(){
  const el=$('schedEl');
  if(!S.matches.length){el.innerHTML='<div class="empty">尚未分組抽籤。</div>';return;}
  const tm=tmMap();const ng=S.event.numGroups||2;
  let html='';
  for(let gi=0;gi<ng;gi++){
    const gm=S.matches.filter(m=>m.gIdx===gi);if(!gm.length) continue;
    const col=GC[gi%GC.length];
    const done=gm.filter(m=>m.done).length;
    html+=`<div class="grp-card" style="border-top:3px solid ${col}">

async function saveScore(mid){
  const hs=$(`hs-${mid}`)?.value,as=$(`as-${mid}`)?.value;
  if(hs===''||as==='') return alert('請輸入兩方分數');
  const m=S.matches.find(x=>x.id===mid);if(!m) return;
  const tm=tmMap();
  const old=m.done?`原${m.hs}:${m.as}`:'新增';
  m.hs=+hs;m.as=+as;m.done=true;
  const detail=`[${GN[m.gIdx]}組]#${mid} ${tm[m.home]?.name} ${m.hs}:${m.as} ${tm[m.away]?.name} (${old})`;
  setSt('busy','儲存...');
  const d=await gas('saveEvent',{eid:CUR_EID,state:snap(),logAction:'score',logDetail:detail});
  if(d.ok){setSt('ok','已儲存');renderSched();renderStand();renderKO();}
  else setSt('err','儲存失敗');
}

function calcGrpStand(gi){
  const {ptWin,ptDraw,ptLose}=S.event;
  const ids=new Set(S.groups[gi]||[]);
  const map={};
  S.teams.filter(t=>ids.has(t.id)).forEach(t=>{
    map[t.id]={id:t.id,name:t.name,seed:t.seed,W:0,D:0,L:0,GF:0,GA:0,P:0,played:0};
  });
  S.matches.filter(m=>m.gIdx===gi&&m.done).forEach(m=>{
    const h=map[m.home],a=map[m.away];if(!h||!a) return;
    const hs=+m.hs,as_=+m.as;
    h.GF+=hs;h.GA+=as_;a.GF+=as_;a.GA+=hs;h.played++;a.played++;
    if(hs>as_){h.W++;h.P+=+ptWin;a.L++;a.P+=+ptLose;}
    else if(hs<as_){a.W++;a.P+=+ptWin;h.L++;h.P+=+ptLose;}
    else{h.D++;h.P+=+ptDraw;a.D++;a.P+=+ptDraw;}
  });
  return Object.values(map).sort((a,b)=>b.P-a.P||(b.GF-b.GA)-(a.GF-a.GA)||b.GF-a.GF);
}

function renderMatrixHTML(gi){
  const grpIds=S.groups[gi]||[];
  const teams=grpIds.map(id=>S.teams.find(t=>t.id===id)).filter(Boolean);
  if(!teams.length) return '<div class="empty">無資料</div>';
  const mMap={};
  S.matches.filter(m=>m.gIdx===gi).forEach(m=>{mMap[m.home+'_'+m.away]=m;mMap[m.away+'_'+m.home]={...m,_rev:true};});
  const stand=calcGrpStand(gi);
  const pts=Object.fromEntries(stand.map(r=>[r.id,r.P]));
  let html=`<div class="matrix-wrap"><table class="matrix"><thead><tr><th></th>
    ${teams.map(t=>`<th title="${esc(t.name)}">${esc(t.name.length>5?t.name.slice(0,5)+'…':t.name)}</th>`).join('')}
    <th>積分</th></tr></thead><tbody>`;
  teams.forEach(row=>{
    html+=`<tr><th class="team-th">${esc(row.name)}</th>`;
    teams.forEach(col=>{
      if(row.id===col.id){html+='<td class="diag">—</td>';return;}
      const m=mMap[row.id+'_'+col.id];
      if(!m||!m.done){html+='<td style="color:var(--t3)">-</td>';return;}
      const hs=m._rev?+m.as:+m.hs,as_=m._rev?+m.hs:+m.as;
      const cls=hs>as_?'won':hs<as_?'lost':'drw';
      html+=`<td class="${cls}">${hs}:${as_}</td>`;
    });
    html+=`<td class="pts">${pts[row.id]??0}</td></tr>`;
  });
  return html+'</tbody></table></div>';
}

function drawBarChart(gi){
  const canvas=document.getElementById('barChart-'+gi);
  if(!canvas) return;
  const stand=calcGrpStand(gi);
  if(!stand.length) return;
  const col=GC[gi%GC.length];
  const ctx=canvas.getContext('2d');
  const labels=stand.map(r=>r.name);
  const pts=stand.map(r=>r.P);
  const wins=stand.map(r=>r.W);
  const draws=stand.map(r=>r.D);
  const losses=stand.map(r=>r.L);
  const maxPts=Math.max(...pts,1);

  const W=canvas.offsetWidth||canvas.parentElement?.offsetWidth||300;
  const H=200;
  canvas.width=W;canvas.height=H;
  ctx.clearRect(0,0,W,H);

  const n=labels.length;
  const padL=14,padR=8,padT=12,padB=36;
  const barW=(W-padL-padR)/n*0.55;
  const spacing=(W-padL-padR)/n;

  // grid lines
  ctx.strokeStyle='rgba(30,48,80,.8)';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=padT+(H-padT-padB)*i/4;
    ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();
  }

  // bars
  stand.forEach((r,i)=>{
    const x=padL+i*spacing+spacing/2-barW/2;
    const barH=(r.P/maxPts)*(H-padT-padB);
    const y=padT+(H-padT-padB)-barH;
    // gradient
    const grad=ctx.createLinearGradient(0,y,0,y+barH);
    grad.addColorStop(0,col);
    grad.addColorStop(1,col+'55');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.roundRect(x,y,barW,barH,4);
    ctx.fill();
    // pts label on bar
    ctx.fillStyle='#fff';ctx.font='bold 11px Oswald,sans-serif';ctx.textAlign='center';
    if(barH>18) ctx.fillText(r.P,x+barW/2,y+14);
    // team label
    ctx.fillStyle='rgba(122,154,184,.85)';ctx.font='10px Noto Sans TC,sans-serif';
    const shortName=r.name.length>4?r.name.slice(0,4)+'…':r.name;
    ctx.fillText(shortName,x+barW/2,H-padB+13);
    // W/D/L mini
    ctx.fillStyle='rgba(122,154,184,.6)';ctx.font='9px sans-serif';
    ctx.fillText(`${r.W}勝${r.D}平${r.L}負`,x+barW/2,H-padB+24);
  });

  CHARTS['bar-'+gi]={destroy:()=>{}};  // placeholder (no Chart.js dep)
}

function xcsv(type){
  const BOM='\uFEFF';const tm=tmMap();const ng=S.event.numGroups||2;const adv=S.event.advanceN||2;
  let rows=[];
  if(type==='schedule'){
    rows=[['場次','組別','輪別','主隊','客隊','主隊分','客隊分','狀態']];
    S.matches.forEach(m=>rows.push([m.id,GN[m.gIdx]+'組',m.r,tm[m.home]?.name||'',tm[m.away]?.name||'',m.hs,m.as,m.done?'完賽':'待賽']));
  } else if(type==='standings'){
    rows=[['組別','名次','抽籤號','隊伍','賽','勝','平','負','進球','失球','積分','晉級']];
    for(let gi=0;gi<ng;gi++) calcGrpStand(gi).forEach((r,i)=>rows.push([GN[gi]+'組',i+1,r.seed,r.name,r.played,r.W,r.D,r.L,r.GF,r.GA,r.P,i<adv?'✓':'']));
  } else if(type==='knockout'){
    rows=[['配對','第幾名對決','隊伍A（組）','隊伍B（組）']];
    const stands=Array.from({length:ng},(_,gi)=>calcGrpStand(gi));
    for(let rank=0;rank<adv;rank++){
      const rts=Array.from({length:ng},(_,gi)=>({gi,team:stands[gi][rank]||null}));
      for(let i=0;i<rts.length;i+=2){
        const a=rts[i],b=rts[i+1];
        rows.push([`配對${Math.floor(i/2)+1}`,`第${rank+1}名`,a.team?`${a.team.name}（${GN[a.gi]}組）`:'待定',b?b.team?`${b.team.name}（${GN[b.gi]}組）`:'待定':'—']);
      }
    }
  } else {
    rows=[['=== 賽事資訊 ===']];
    rows.push(['賽事名稱',S.event.name],['組數',ng],['每組晉級',adv],['備註',S.event.note||'']);
    rows.push([],['=== 賽程 ==='],['場次','組別','輪別','主隊','客隊','主隊分','客隊分','狀態']);
    S.matches.forEach(m=>rows.push([m.id,GN[m.gIdx]+'組',m.r,tm[m.home]?.name||'',tm[m.away]?.name||'',m.hs,m.as,m.done?'完賽':'待賽']));
    rows.push([],['=== 積分榜 ==='],['組別','名次','隊伍','賽','勝','平','負','進球','失球','積分','晉級']);
    for(let gi=0;gi<ng;gi++) calcGrpStand(gi).forEach((r,i)=>rows.push([GN[gi]+'組',i+1,r.name,r.played,r.W,r.D,r.L,r.GF,r.GA,r.P,i<adv?'✓':'']));
  }
  const csv=BOM+rows.map(r=>r.map(c=>`"${String(c??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=`${S.event.name||'分組循環賽'}_${type}_${dateStr()}.csv`;a.click();
}

        <td><b>${a.team?esc(a.team.name):'待定'}</b></td><td>${GN[a.gi]}組</td>
        <td style="text-align:center;font-weight:700">VS</td>
        <td><b>${b?b.team?esc(b.team.name):'待定':'—'}</b></td><td>${b?GN[b.gi]+'組':'—'}</td></tr>`;
    }
    body+='</table>';
  }
  popPrint(body);
}
function popPrint(body){
  const w=window.open('','','width=960,height=720');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
    <style>body{font-family:sans-serif;padding:24px}h2{margin-bottom:13px}h3{margin:13px 0 5px}</style></head>
    <body>${body}<script>window.print();<\/script></body></html>`);
  w.document.close();
}
function openSheet(){if(S.sheetUrl) window.open(S.sheetUrl,'_blank');else alert('尚未取得試算表連結');}

// ══════════════════════════════════════
// ADMIN
// ══════════════════════════════════════
function toggleAdmin(){
  if(ADMIN){
    ADMIN=false;$('adminBtn').textContent='🔐 管理者';$('adminBtn').classList.remove('on');
    $('adminCard').style.display='none';renderTeams();renderSched();
  } else {$('adminPw').value='';msg('adminMsg','','');open_('adminMod');}
}
async function checkAdmin(){
  msg('adminMsg','<span class="spin"></span> 驗證中...','inf');
  try{
    const d=await gas('auth',{password:$('adminPw').value});
    if(d.ok){
      ADMIN=true;close_('adminMod');
      $('adminBtn').textContent='🔓 管理者';$('adminBtn').classList.add('on');
      $('adminCard').style.display='block';renderTeams();renderSched();
      await gas('log',{eid:CUR_EID,action:'auth',detail:'管理者登入'});
    } else msg('adminMsg','密碼錯誤','err');
  }catch{msg('adminMsg','驗證失敗','err');}
}
function needAdmin(){alert('請先點右上角「🔐 管理者」登入');}
function openChgPw(){$('np1').value='';$('np2').value='';msg('cpMsg','','');open_('chgPwMod');}
async function doChgPw(){
  const p1=$('np1').value,p2=$('np2').value;
  if(!p1) return msg('cpMsg','密碼不可為空','err');
  if(p1!==p2) return msg('cpMsg','兩次不一致','err');
  msg('cpMsg','<span class="spin"></span>','inf');
  const d=await gas('changePassword',{password:p1});
  if(d.ok){msg('cpMsg','✅ 已更新','ok');setTimeout(()=>close_('chgPwMod'),1200);}
  else msg('cpMsg','失敗：'+d.msg,'err');
}
async function doReset(){
  if(!ADMIN) return needAdmin();
  if(!CUR_EID) return alert('請先選擇賽事');
  if(!confirm(`確定重置「${S.event.name}」的分組與賽程？隊伍資料保留。`)) return;
  S.groups=[];S.matches=[];
  const d=await gas('saveEvent',{eid:CUR_EID,state:snap(),logAction:'reset',logDetail:`重置：${S.event.name}`});
  if(d.ok){alert('已重置。');applyUI();await loadAll();}
}
async function doDelete(){
  if(!ADMIN) return needAdmin();
  if(!CUR_EID) return alert('請先選擇賽事');
  if(!confirm(`確定永久刪除「${S.event.name}」？此動作無法復原！`)) return;
  const d=await gas('deleteEvent',{eid:CUR_EID});
  if(d.ok){
    CUR_EID='';localStorage.removeItem('rr_eid');
    S={event:{name:'',ptWin:3,ptDraw:1,ptLose:0,note:'',numGroups:2,advanceN:2},teams:[],groups:[],matches:[],sheetUrl:S.sheetUrl};
    applyUI();await loadAll();showTab($$('[data-tab="events"]'),'events');
  } else alert('刪除失敗：'+d.msg);
}

// ══════════════════════════════════════
// TABS
// ══════════════════════════════════════
function showTab(btn,tab){
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');$('tab-'+tab).classList.add('on');
  if(tab==='grouping')  renderGroupTab();
  if(tab==='schedule')  renderSched();
  if(tab==='standings') renderStand();
  if(tab==='charts')    renderCharts();
  if(tab==='knockout')  renderKO();
  if(tab==='history')   loadHist();
  if(tab==='events')    renderEvList();
}

// ══════════════════════════════════════
// UTILS
// ══════════════════════════════════════
function $(id){return document.getElementById(id);}
function $$(sel){return document.querySelector(sel);}
function open_(id){$(id).classList.add('show');}
function close_(id){$(id).classList.remove('show');}
function msg(id,html,type){const el=$(id);if(!el)return;el.innerHTML=html?`<div class="al ${type}">${html}</div>`:'.';}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function dateStr(){return new Date().toISOString().slice(0,10);}
function tmMap(teams){const t=teams||S.teams;return Object.fromEntries(t.map(x=>[x.id,x]));}
function snap(){return {event:S.event,teams:S.teams,groups:S.groups,matches:S.matches};}
